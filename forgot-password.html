<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your SecureAuth password securely via email.">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <title>Reset Password — SecureAuth</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>
  <canvas id="particles-canvas"></canvas>

  <!-- Back Link -->
  <a href="login.html" class="back-link" id="back-to-login">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Sign In
  </a>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-card" id="forgot-card">

      <!-- Header -->
      <div class="auth-header">
        <div class="auth-logo">
          <svg viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <h1>Reset Password</h1>
        <p>Enter your email and we'll send you a reset link</p>
      </div>

      <!-- Reset Form -->
      <form class="auth-form" id="forgot-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reset-email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input
              type="email"
              id="reset-email"
              class="form-input"
              data-validate="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>
          <div class="form-error" id="reset-email-error">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>Please enter a valid email address</span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="reset-submit-btn">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Send Reset Link
        </button>
      </form>

      <!-- Success Message (hidden by default) -->
      <div class="success-message" id="reset-success">
        <div class="success-icon">
          <svg viewBox="0 0 24 24">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <h2>Check Your Email</h2>
        <p>If an account exists with this email, we've sent a password reset link. Please check your inbox and spam folder.</p>
        <a href="login.html" class="btn btn-secondary" id="back-to-login-btn">
          <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to Sign In
        </a>
      </div>

      <!-- Footer -->
      <div class="auth-footer" id="forgot-footer">
        <p>Remember your password? <a href="login.html" id="go-to-login">Sign in</a></p>
      </div>

    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>

  <script>
    // Initialize UI
    UI.init({
      particles: true,
      formValidation: '#forgot-form'
    });

    // Handle password reset form
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('reset-email').value.trim();
      const submitBtn = document.getElementById('reset-submit-btn');

      if (!email || !Validator.isValidEmail(email)) {
        UI.setFieldState(document.getElementById('reset-email'), 'invalid', 'Please enter a valid email address');
        return;
      }

      try {
        UI.setButtonLoading(submitBtn, true);

        const result = await Auth.resetPassword(email);

        // Hide form and show success message
        document.getElementById('forgot-form').style.display = 'none';
        document.getElementById('forgot-footer').style.display = 'none';
        document.getElementById('reset-success').classList.add('visible');

        UI.success('Email Sent', result.message);

      } catch (error) {
        UI.setButtonLoading(submitBtn, false);
        UI.error('Error', error.message);
      }
    });
  </script>
</body>
</html>
