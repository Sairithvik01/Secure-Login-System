name: Deploy

on:
  push:
    branches:
      - main        # adjust to your default branch name if different
  workflow_dispatch: # allow manual runs from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ── Which GitHub Environment to pull secrets from ──────────────────────────
    # Create an Environment called "production" in:
    #   GitHub → Repository → Settings → Environments → New environment
    # Then add the Firebase secrets listed below to that environment.
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Generate js/env-config.js from GitHub Secrets ─────────────────────────
      # This file is gitignored and is NEVER stored in the repo.
      # It is created fresh on every deploy run.
      - name: Generate env-config.js from secrets
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
        run: |
          cat > js/env-config.js <<EOF
          /* Auto-generated by GitHub Actions — DO NOT COMMIT */
          window.__ENV__ = {
            FIREBASE_API_KEY:             "$FIREBASE_API_KEY",
            FIREBASE_AUTH_DOMAIN:         "$FIREBASE_AUTH_DOMAIN",
            FIREBASE_PROJECT_ID:          "$FIREBASE_PROJECT_ID",
            FIREBASE_STORAGE_BUCKET:      "$FIREBASE_STORAGE_BUCKET",
            FIREBASE_MESSAGING_SENDER_ID: "$FIREBASE_MESSAGING_SENDER_ID",
            FIREBASE_APP_ID:              "$FIREBASE_APP_ID"
          };
          EOF

      # ── Deploy to GitHub Pages ─────────────────────────────────────────────────
      # This uses the official GitHub Pages action to publish the site.
      # Make sure GitHub Pages is enabled in: Settings → Pages → Source → GitHub Actions
      - name: Upload site to GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."   # deploy the whole repo root (adjust if your site is in a subfolder)

  # Separate job required by the GitHub Pages action
  pages:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
